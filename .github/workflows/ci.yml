name: ci

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  CONFIGURATION: Release
  SOLUTION_FILE: SessionGuard.sln

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        shell: pwsh
        run: dotnet restore $env:SOLUTION_FILE

      - name: Format
        shell: pwsh
        run: dotnet format $env:SOLUTION_FILE --verify-no-changes --no-restore --verbosity minimal

      - name: Build
        shell: pwsh
        run: dotnet build $env:SOLUTION_FILE -c $env:CONFIGURATION --no-restore

      - name: Test
        shell: pwsh
        run: dotnet test $env:SOLUTION_FILE -c $env:CONFIGURATION --no-build --verbosity minimal

  container-build:
    name: Container Build
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: server-api
            dockerfile: src/Server.Api/Dockerfile
            repository: sessionguard-server-api
          - name: server-ui
            dockerfile: src/Server.Ui/Dockerfile
            repository: sessionguard-server-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.service.repository }}:ci
          provenance: false
          sbom: false

  publish:
    name: Publish Container Images
    runs-on: ubuntu-latest
    needs:
      - validate
      - container-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: server-api
            dockerfile: src/Server.Api/Dockerfile
            repository: sessionguard-server-api
          - name: server-ui
            dockerfile: src/Server.Ui/Dockerfile
            repository: sessionguard-server-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.service.repository }}:${{ github.ref_name }}
          provenance: false
          sbom: false
