name: ci

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  CONFIGURATION: Release
  SOLUTION_FILE: SessionGuard.sln

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        shell: pwsh
        run: dotnet restore $env:SOLUTION_FILE

      - name: Format
        shell: pwsh
        run: dotnet format $env:SOLUTION_FILE --verify-no-changes --no-restore --verbosity minimal

      - name: Build
        shell: pwsh
        run: dotnet build $env:SOLUTION_FILE -c $env:CONFIGURATION --no-restore

      - name: Test
        shell: pwsh
        run: dotnet test $env:SOLUTION_FILE -c $env:CONFIGURATION --no-build --verbosity minimal

  container-build:
    name: Container Build
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Server.Ui/Dockerfile
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/sessionguard-server:ci
          provenance: false
          sbom: false

  agent-deb-build:
    name: Agent Debian Package
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        shell: pwsh
        run: dotnet restore $env:SOLUTION_FILE

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.1.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build agent deb
        shell: bash
        env:
          SESSIONGUARD_VERSION: ${{ steps.version.outputs.version }}
          SESSIONGUARD_ARTIFACT_DIR: ${{ github.workspace }}/artifacts
          CONFIGURATION: ${{ env.CONFIGURATION }}
        run: bash packaging/deb/build-agent-deb.sh

      - name: Upload agent deb
        uses: actions/upload-artifact@v4
        with:
          name: sessionguard-agent_${{ steps.version.outputs.version }}_amd64
          path: artifacts/sessionguard-agent_${{ steps.version.outputs.version }}_amd64.deb
          if-no-files-found: error

  publish:
    name: Publish Container Images
    runs-on: ubuntu-latest
    needs:
      - validate
      - container-build
      - agent-deb-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Server.Ui/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/sessionguard-server:${{ github.ref_name }}
          provenance: false
          sbom: false
