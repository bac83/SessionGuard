services:
  server:
    image: ghcr.io/${SESSIONGUARD_IMAGE_OWNER:-sessionguard}/sessionguard-server:${SESSIONGUARD_IMAGE_TAG:-main}
    pull_policy: always
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
      SessionGuard__Storage__SqlitePath: /data/sessionguard.db
      SessionGuard__Security__ApiKey: change-me
    ports:
      - "8080:8080"
    volumes:
      - sessionguard-data:/data

volumes:
  sessionguard-data:
